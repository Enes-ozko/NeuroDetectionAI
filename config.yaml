seed: 42
image_size: 224
n_folds: 5
batch_size: 64
num_workers: 4
train_root: "/kaggle/input/datasets/masoudnickparvar/brain-tumor-mri-dataset/Training"
test_root:  "/kaggle/input/datasets/masoudnickparvar/brain-tumor-mri-dataset/Testing"
classes:
  - glioma
  - meningioma
  - notumor
  - pituitary
samples_per_class: null

notumor_idx: 2
threshold_low: 0.3
threshold_high: 0.7
lr: 0.0005
weight_decay: 0.0005
scheduler: "cosine"
T_max: 80
label_smoothing: 0.05
mixup_alpha: 0.2
dropout_p: 0.5
epochs: 80
patience: 15
tta_n_augments: 5
unfreeze_epoch: 8
dropout_p_e3: 0.3