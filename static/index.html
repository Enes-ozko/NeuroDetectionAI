<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IRM — Classificateur de tumeurs cérébrales</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0d1117;
            --surface:   #161b22;
            --border:    #30363d;
            --text:      #e6edf3;
            --muted:     #8b949e;
            --green:     #3fb950;
            --red:       #f85149;
            --amber:     #d29922;
            --blue:      #58a6ff;
            --blue-dim:  #1f3a5c;
            --radius:    10px;
        }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2.5rem 1rem 4rem;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        header h1 {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text);
        }
        header p {
            font-size: 0.85rem;
            color: var(--muted);
            margin-top: 6px;
        }
        .badge {
            display: inline-block;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.72rem;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 3px 8px;
            border-radius: 4px;
            margin: 0 3px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
        }

        .container {
            width: 100%;
            max-width: 740px;
        }

        /* ── Drop zone ─────────────────────────────────────────────────── */
        #drop-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            background: var(--surface);
        }
        #drop-zone:hover, #drop-zone.drag-over {
            border-color: var(--blue);
            background: #161d2e;
        }
        #drop-zone svg { color: var(--muted); margin-bottom: 12px; }
        #drop-zone p.main { font-size: 0.95rem; font-weight: 500; }
        #drop-zone p.sub  { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

        /* ── Result layout ─────────────────────────────────────────────── */
        #result-section { display: none; }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            align-items: start;
        }
        @media (max-width: 520px) { .grid-2 { grid-template-columns: 1fr; } }

        #preview-img {
            width: 100%;
            border-radius: var(--radius);
            display: block;
            border: 1px solid var(--border);
        }

        .label-sm {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 8px;
        }

        /* ── Steps ─────────────────────────────────────────────────────── */
        .step {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 14px;
            margin-bottom: 10px;
        }
        .step-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.78rem;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .step-header span { font-family: 'IBM Plex Mono', monospace; }
        .step-result {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .step-label { font-size: 0.95rem; font-weight: 600; }
        .conf-pill {
            margin-left: auto;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 20px;
            border: 1px solid;
        }

        /* ── Bars ─────────────────────────────────────────────────────── */
        .bar-row { margin-bottom: 8px; }
        .bar-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.78rem;
            margin-bottom: 3px;
            color: var(--muted);
        }
        .bar-labels .val { color: var(--text); font-family: 'IBM Plex Mono', monospace; }
        .bar-track {
            background: #21262d;
            border-radius: 4px;
            height: 8px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s cubic-bezier(.4,0,.2,1);
        }

        /* ── Verdict ──────────────────────────────────────────────────── */
        #verdict {
            border-radius: var(--radius);
            padding: 14px 16px;
            border: 1px solid var(--border);
            margin-top: 10px;
        }
        #verdict .v-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 4px; }
        #verdict .v-text  { font-size: 1rem; font-weight: 600; }

        /* ── Spinner ──────────────────────────────────────────────────── */
        #spinner { display: none; align-items: center; gap: 10px; margin-bottom: 12px; }
        #spinner.active { display: flex; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { animation: spin 0.8s linear infinite; }

        /* ── Reset button ─────────────────────────────────────────────── */
        #reset-btn {
            display: block;
            margin: 1.5rem auto 0;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 0.82rem;
            padding: 7px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }
        #reset-btn:hover { border-color: var(--blue); color: var(--blue); }

        /* ── Error ────────────────────────────────────────────────────── */
        #error-box {
            display: none;
            background: #1c1010;
            border: 1px solid #5c2020;
            color: var(--red);
            font-size: 0.82rem;
            border-radius: var(--radius);
            padding: 10px 14px;
            margin-top: 10px;
        }

        /* ── Icons (inline SVG helpers) ───────────────────────────────── */
        .icon { width: 18px; height: 18px; flex-shrink: 0; }
    </style>
</head>
<body>

<header>
    <h1>Classificateur IRM — Tumeurs cérébrales</h1>
    <p>
   
</header>

<div class="container">

    <!-- Drop zone -->
    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" accept=".jpg,.jpeg,.png" style="display:none">
        <svg class="icon" style="width:48px;height:48px;display:block;margin:0 auto 14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3l-6 9m6-9l6 9m-6-9v18m-6-9h12m-12 0l6 9m6-9l-6 9"/>
        </svg>
        <p class="main">Déposez votre image IRM ici</p>
        <p class="sub">ou cliquez pour sélectionner &nbsp;·&nbsp; JPG / PNG</p>
    </div>

    <!-- Result section -->
    <div id="result-section">
        <div class="grid-2">

            <!-- Image preview -->
            <div>
                <p class="label-sm">Image analysée</p>
                <img id="preview-img" src="" alt="IRM analysée">
            </div>

            <!-- Pipeline results -->
            <div>
                <p class="label-sm">Résultats du pipeline</p>

                <div id="spinner">
                    <svg class="icon spin" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                        <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                    </svg>
                    <span style="font-size:0.83rem; color:var(--muted)">Inférence en cours…</span>
                </div>

                <div id="error-box"></div>

                <div id="result-block" style="display:none">

                    <!-- Étape 1 -->
                    <div class="step">
                        <div class="step-header">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
                            <span>Étape 1 — Détection binaire</span>
                        </div>
                        <div class="step-result">
                            <span id="step1-icon"></span>
                            <span id="step1-label" class="step-label"></span>
                            <span id="step1-conf" class="conf-pill"></span>
                        </div>
                    </div>

                    <!-- Étape 2 (conditionnelle) -->
                    <div class="step" id="step2-card" style="display:none">
                        <div class="step-header">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3l-6 9"/><circle cx="12" cy="16" r="4"/></svg>
                            <span>Étape 2 — Classification multiclasse</span>
                        </div>
                        <div id="bars-container" style="margin-top: 4px;"></div>
                    </div>

                    <!-- Verdict final -->
                    <div id="verdict">
                        <div class="v-label">Diagnostic final</div>
                        <div id="verdict-text" class="v-text"></div>
                    </div>

                </div>
            </div>
        </div>

        <button id="reset-btn" onclick="resetUI()">↩ Analyser une autre image</button>
    </div>

</div>

<script>
    const BAR_COLORS = ["#f85149", "#3fb950", "#58a6ff"];

    // ── Drag & drop ───────────────────────────────────────────────────────────────
    const dropZone  = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file && (file.type === 'image/jpeg' || file.type === 'image/png')) handleFile(file);
    });
    fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

    // ── Gestion du fichier ────────────────────────────────────────────────────────
    function handleFile(file) {
        // Affichage preview
        const reader = new FileReader();
        reader.onload = ev => { document.getElementById('preview-img').src = ev.target.result; };
        reader.readAsDataURL(file);

        // Afficher la section résultat
        dropZone.style.display = 'none';
        document.getElementById('result-section').style.display = 'block';
        document.getElementById('spinner').classList.add('active');
        document.getElementById('result-block').style.display = 'none';
        document.getElementById('error-box').style.display = 'none';

        // Appel API
        const form = new FormData();
        form.append('image', file);

        fetch('/predict', { method: 'POST', body: form })
            .then(r => r.json())
            .then(data => {
                document.getElementById('spinner').classList.remove('active');
                if (data.error) { showError(data.error); return; }
                renderResult(data);
            })
            .catch(() => {
                document.getElementById('spinner').classList.remove('active');
                showError("Impossible de contacter le serveur. Vérifiez que app.py est lancé.");
            });
    }

    // ── Affichage résultat ────────────────────────────────────────────────────────
    function renderResult(data) {
        document.getElementById('result-block').style.display = 'block';

        const step1Label = document.getElementById('step1-label');
        const step1Icon  = document.getElementById('step1-icon');
        const step1Conf  = document.getElementById('step1-conf');

        if (!data.has_tumor) {
            step1Icon.innerHTML  = svgCheck();
            step1Label.textContent = 'Cerveau sain';
            step1Label.style.color = 'var(--green)';
            step1Conf.textContent  = data.sain_conf + '%';
            step1Conf.style.color  = 'var(--green)';
            step1Conf.style.borderColor = 'var(--green)';

            document.getElementById('step2-card').style.display = 'none';

            const verdict = document.getElementById('verdict');
            verdict.style.borderColor = '#1f4a2a';
            verdict.style.background  = '#0d1f13';
            document.getElementById('verdict-text').textContent = 'Aucune anomalie détectée — cerveau sain';
            document.getElementById('verdict-text').style.color = 'var(--green)';

        } else {
            step1Icon.innerHTML  = svgAlert();
            step1Label.textContent = 'Tumeur détectée';
            step1Label.style.color = 'var(--amber)';
            step1Conf.textContent  = data.tumor_conf + '%';
            step1Conf.style.color  = 'var(--amber)';
            step1Conf.style.borderColor = 'var(--amber)';

            // Barres multiclasse
            const container = document.getElementById('bars-container');
            container.innerHTML = '';
            data.classes.forEach((cls, i) => {
                const isWinner = i === data.pred_idx;
                container.innerHTML += `
        <div class="bar-row">
          <div class="bar-labels">
            <span style="${isWinner ? 'color:var(--text); font-weight:600' : ''}">${cls}</span>
            <span class="val">${data.probs[i]}%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${data.probs[i]}%; background:${isWinner ? BAR_COLORS[i] : '#30363d'};"></div>
          </div>
        </div>`;
            });

            document.getElementById('step2-card').style.display = 'block';

            const verdict = document.getElementById('verdict');
            verdict.style.borderColor = '#5c1a1a';
            verdict.style.background  = '#1c0e0e';
            document.getElementById('verdict-text').textContent =
                `Tumeur de type ${data.tumor_class}  —  confiance ${data.probs[data.pred_idx]}%`;
            document.getElementById('verdict-text').style.color = 'var(--red)';
        }
    }

    function showError(msg) {
        const box = document.getElementById('error-box');
        box.textContent = '⚠ ' + msg;
        box.style.display = 'block';
    }

    function resetUI() {
        document.getElementById('result-section').style.display = 'none';
        dropZone.style.display = 'block';
        fileInput.value = '';
    }

    // ── Icônes inline ─────────────────────────────────────────────────────────────
    function svgCheck() {
        return `<svg style="width:18px;height:18px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>`;
    }
    function svgAlert() {
        return `<svg style="width:18px;height:18px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
    }
</script>

</body>
</html>
