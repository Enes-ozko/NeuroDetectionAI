<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroDetectionIA — Analyse</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav>
  <span class="nav-brand">Neuro<span>Detection</span>IA</span>
  <a href="/" class="nav-link active">Analyse</a>
  <a href="/stats" class="nav-link">Statistiques</a>
</nav>

<main class="page">
  <div class="page-title">Analyse IRM</div>
  <div class="page-sub">Classification et localisation des tumeurs cerebrales</div>

  <div class="model-status" id="modelStatus"></div>

  <div class="drop-zone" id="dropZone">
    <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M16 8l-4-4-4 4M12 4v12"/>
    </svg>
    <p>Glisser des images IRM ici</p>
    <small>JPG, PNG, JPEG </small>
    <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
  </div>

  <div class="queue" id="queue"></div>

  <div class="toolbar" id="toolbar" style="display:none">
    <button class="btn btn-primary" id="runBtn">Lancer l'analyse</button>
    <button class="btn btn-ghost" id="clearBtn">Vider</button>
    <span class="toolbar-info" id="toolbarInfo"></span>
  </div>

  <div class="results" id="results"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
